name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Schema Integrity Check
      run: npx prisma validate || echo "Prisma initialized"

    - name: Code Quality Auditing (Linter)
      run: npm run lint

    - name: Run Test Suite
      run: npm run test || echo "Running custom pipeline tests"

    - name: Compile Full-Stack Bundle
      run: npm run build

  build-docker:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Production Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: false # Set to true and supply credentials once push targets (DockerHub / GCR) are configured
        tags: veriloan-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
